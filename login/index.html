<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>ログイン | Terroir HUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background-color: #FAFAF8;
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
    }

    .login-logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .login-logo h1 {
      font-family: 'Shippori Mincho', serif;
      font-size: 28px;
      font-weight: 700;
      color: #B8452A;
      letter-spacing: 0.08em;
    }

    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.06);
      padding: 40px 32px 32px;
    }

    .login-card h2 {
      font-family: 'Shippori Mincho', serif;
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 28px;
      color: #333;
    }

    /* Google Button */
    .btn-google {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 13px 16px;
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      font-weight: 500;
      color: #333;
      cursor: pointer;
      transition: background 0.2s, box-shadow 0.2s;
    }

    .btn-google:hover {
      background: #f7f7f7;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.08);
    }

    .btn-google svg {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 24px 0;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e0e0e0;
    }

    .divider span {
      font-size: 13px;
      color: #999;
      white-space: nowrap;
    }

    /* Form */
    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #555;
      margin-bottom: 6px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      color: #333;
      background: #FAFAF8;
      transition: border-color 0.2s;
      outline: none;
    }

    .form-group input:focus {
      border-color: #B8452A;
    }

    .btn-submit {
      display: block;
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #B8452A;
      color: #fff;
      font-family: 'Noto Sans JP', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }

    .btn-submit:hover {
      background: #9e3a23;
    }

    .btn-submit:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    /* Mode toggle */
    .mode-toggle {
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: #777;
    }

    .mode-toggle a {
      color: #D4728A;
      text-decoration: none;
      font-weight: 500;
      cursor: pointer;
    }

    .mode-toggle a:hover {
      text-decoration: underline;
    }

    /* Messages */
    .msg-error {
      background: #fef2f2;
      color: #b91c1c;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    .msg-success {
      background: #f0fdf4;
      color: #15803d;
      border: 1px solid #bbf7d0;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      margin-bottom: 16px;
      display: none;
    }

    /* Footer note */
    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #999;
      line-height: 1.7;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 32px 20px 24px;
      }

      .login-logo h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-logo">
      <h1>Terroir HUB</h1>
    </div>

    <div class="login-card">
      <h2 id="cardTitle">Terroir HUB アカウントでログイン</h2>

      <div class="msg-error" id="msgError"></div>
      <div class="msg-success" id="msgSuccess"></div>

      <!-- Google Login -->
      <button class="btn-google" onclick="doGoogleLogin()">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Googleアカウントでログイン
      </button>

      <div class="divider"><span>または</span></div>

      <!-- Email/Password Form -->
      <form id="loginForm" onsubmit="event.preventDefault(); doLogin();">
        <div class="form-group">
          <label for="email">メールアドレス</label>
          <input type="email" id="email" placeholder="example@mail.com" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="pass">パスワード</label>
          <input type="password" id="pass" placeholder="6文字以上" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-submit" id="btnSubmit">ログイン</button>
      </form>

      <div class="mode-toggle">
        <span id="toggleText">アカウントをお持ちでない方は</span>
        <a id="toggleLink" onclick="toggleMode()">無料登録</a>
      </div>
    </div>

    <p class="login-footer">
      ログインすると、SAKE・クエスト・マイページを<br>全サービスで共通で利用できます
    </p>
  </div>

  <script>
    // ---- Supabase ----
    const SUPABASE_URL = 'https://hhwavxavuqqfiehrogwv.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhod2F2eGF2dXFxZmllaHJvZ3d2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Njk3MzAsImV4cCI6MjA4OTU0NTczMH0.tHMQ_u51jp69AMUKKtTvxL09Sr11JFPKGRhKMmUzEjg';

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ---- Redirect ----
    const params = new URLSearchParams(location.search);
    const rawRedirect = params.get('redirect') || 'https://terroirhub.com/';

    function isAllowedRedirect(url) {
      try {
        const u = new URL(url);
        return u.hostname === 'terroirhub.com' || u.hostname.endsWith('.terroirhub.com');
      } catch (e) {
        return false;
      }
    }

    const redirectUrl = isAllowedRedirect(rawRedirect) ? rawRedirect : 'https://terroirhub.com/';

    function redirectWithToken(session) {
      const url = new URL(redirectUrl);
      url.searchParams.set('access_token', session.access_token);
      url.searchParams.set('refresh_token', session.refresh_token);
      window.location.href = url.toString();
    }

    // ---- Check existing session ----
    sb.auth.getSession().then(({ data: { session } }) => {
      if (session) {
        redirectWithToken(session);
      }
    });

    // ---- Auth state change ----
    sb.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session) {
        redirectWithToken(session);
      }
    });

    // ---- Mode (login / signup) ----
    let mode = 'login';

    function toggleMode() {
      const title = document.getElementById('cardTitle');
      const btn = document.getElementById('btnSubmit');
      const toggleText = document.getElementById('toggleText');
      const toggleLink = document.getElementById('toggleLink');
      const passInput = document.getElementById('pass');

      hideMessages();

      if (mode === 'login') {
        mode = 'signup';
        title.textContent = 'Terroir HUB に無料登録';
        btn.textContent = '無料登録';
        toggleText.textContent = 'アカウントをお持ちの方は';
        toggleLink.textContent = 'ログイン';
        passInput.autocomplete = 'new-password';
      } else {
        mode = 'login';
        title.textContent = 'Terroir HUB アカウントでログイン';
        btn.textContent = 'ログイン';
        toggleText.textContent = 'アカウントをお持ちでない方は';
        toggleLink.textContent = '無料登録';
        passInput.autocomplete = 'current-password';
      }
    }

    // ---- Messages ----
    function showError(msg) {
      const el = document.getElementById('msgError');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('msgSuccess').style.display = 'none';
    }

    function showSuccess(msg) {
      const el = document.getElementById('msgSuccess');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('msgError').style.display = 'none';
    }

    function hideMessages() {
      document.getElementById('msgError').style.display = 'none';
      document.getElementById('msgSuccess').style.display = 'none';
    }

    // ---- Email Login / Signup ----
    async function doLogin() {
      hideMessages();
      const email = document.getElementById('email').value.trim();
      const pass = document.getElementById('pass').value;
      const btn = document.getElementById('btnSubmit');

      if (!email || !pass) {
        showError('メールアドレスとパスワードを入力してください');
        return;
      }
      if (pass.length < 6) {
        showError('パスワードは6文字以上で入力してください');
        return;
      }

      btn.disabled = true;

      if (mode === 'signup') {
        const { error } = await sb.auth.signUp({ email, password: pass });
        btn.disabled = false;
        if (error) {
          showError(error.message);
          return;
        }
        showSuccess('確認メールを送信しました。メールのリンクをクリックしてください。');
      } else {
        const { error } = await sb.auth.signInWithPassword({ email, password: pass });
        btn.disabled = false;
        if (error) {
          showError(
            error.message === 'Invalid login credentials'
              ? 'メールアドレスまたはパスワードが違います'
              : error.message
          );
          return;
        }
        // onAuthStateChange will handle redirect
      }
    }

    // ---- Google Login ----
    async function doGoogleLogin() {
      const { error } = await sb.auth.signInWithOAuth({
        provider: 'google',
        options: {
          redirectTo: window.location.href
        }
      });
      if (error) {
        showError(error.message);
      }
    }
  </script>
</body>
</html>
